name: Mobile Sync Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  capacitor-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:mobile
      - run: git diff --exit-code
